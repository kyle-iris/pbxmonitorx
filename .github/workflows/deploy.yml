# ═══════════════════════════════════════════════════════════════════════════
# PBXMonitorX CI/CD Pipeline
#
# Triggers:
#   develop branch → Deploy to DEV server
#   main branch    → Deploy to PROD server (with environment approval)
#   pull requests  → Lint + build only
#
# Required GitHub Secrets:
#   DEV_SSH_HOST   — Dev server IP or hostname
#   DEV_SSH_USER   — Dev SSH username (e.g. azureuser)
#   DEV_SSH_KEY    — Dev private SSH key
#   PROD_SSH_HOST  — Prod server IP or hostname
#   PROD_SSH_USER  — Prod SSH username (e.g. azureuser)
#   PROD_SSH_KEY   — Prod private SSH key
# ═══════════════════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── LINT + TEST ────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r backend/requirements.txt

      - name: Lint with ruff
        run: |
          ruff check backend/src/ --select E,W,F --ignore E501,W291

      - name: Check imports resolve
        run: |
          cd backend
          python -c "
          import importlib, pathlib
          errors = []
          for f in pathlib.Path('src').rglob('*.py'):
              if f.name == '__init__.py': continue
              mod = str(f.with_suffix('')).replace('/', '.')
              try:
                  importlib.import_module(mod)
              except ImportError as e:
                  # Expected — we don't have postgres/redis in CI
                  if 'asyncpg' not in str(e) and 'redis' not in str(e):
                      errors.append(f'{mod}: {e}')
          if errors:
              print('Import errors:')
              for e in errors: print(f'  {e}')
          else:
              print('All imports OK (excluding runtime deps)')
          "

  # ── BUILD DOCKER IMAGES ────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t pbxmonitorx-backend:${{ github.sha }} ./backend

      - name: Verify image starts
        run: |
          docker run --rm pbxmonitorx-backend:${{ github.sha }} \
            python -c "import src.main; print('App module loads OK')" || true

  # ── DEPLOY TO DEV ────────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/pbxmonitorx

            echo "=== Pulling latest (develop) ==="
            git pull origin develop

            echo "=== Building images ==="
            docker compose -f docker-compose.prod.yml build --quiet

            echo "=== Rolling restart ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps --build backend
            docker compose -f docker-compose.prod.yml up -d --no-deps --build worker
            docker compose -f docker-compose.prod.yml up -d --no-deps --build beat
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Verify health ==="
            sleep 5
            curl -sf http://localhost:8000/api/health || echo "Health check warning"

            echo "=== Deploy complete ==="
            docker compose -f docker-compose.prod.yml ps

  # ── DEPLOY TO PRODUCTION ─────────────────────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/pbxmonitorx

            echo "=== Pulling latest (main) ==="
            git pull origin main

            echo "=== Building images ==="
            docker compose -f docker-compose.prod.yml build --quiet

            echo "=== Rolling restart ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps --build backend
            docker compose -f docker-compose.prod.yml up -d --no-deps --build worker
            docker compose -f docker-compose.prod.yml up -d --no-deps --build beat
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Verify health ==="
            sleep 5
            curl -sf http://localhost:8000/api/health || echo "Health check warning"

            echo "=== Deploy complete ==="
            docker compose -f docker-compose.prod.yml ps

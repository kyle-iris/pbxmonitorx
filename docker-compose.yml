version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pbxmonitorx
      POSTGRES_USER: pbxmonitorx
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_now}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbxmonitorx"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (task queue + cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_redis} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────
  backend:
    build: &backend_build
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: &backend_env
      DATABASE_URL: postgresql+asyncpg://pbxmonitorx:${DB_PASSWORD:-change_me_now}@postgres:5432/pbxmonitorx
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis}@redis:6379/0
      MASTER_KEY: ${MASTER_KEY:?Set MASTER_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      BACKUP_PATH: /data/backups
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backupdata:/data/backups

  # ── Celery worker (executes polling, backup, alert tasks) ────
  worker:
    build: *backend_build
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *backend_env
    command: >
      celery -A src.workers.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=500
      -Q celery
    volumes:
      - backupdata:/data/backups

  # ── Celery beat (periodic schedule dispatcher) ────────────────
  beat:
    build: *backend_build
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment: *backend_env
    command: >
      celery -A src.workers.celery_app:celery_app beat
      --loglevel=info

volumes:
  pgdata:
  redisdata:
  backupdata:

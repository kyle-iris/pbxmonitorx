version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
# PBXMonitorX — Production Docker Compose
#
# Services:
#   nginx     → Reverse proxy + TLS termination (host certs)
#   backend   → FastAPI API server
#   worker    → Celery worker (polling, backups, alerts)
#   beat      → Celery beat (periodic schedule)
#   postgres  → Database
#   redis     → Task queue
#
# Usage:
#   cp .env.example .env   # Fill in all values
#   docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── Nginx reverse proxy + SSL ────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - frontend

  # ── FastAPI backend ───────────────────────────────────────────
  backend:
    build: &backend_build
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: &backend_env
      DATABASE_URL: postgresql+asyncpg://pbxmonitorx:${DB_PASSWORD}@postgres:5432/pbxmonitorx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MASTER_KEY: ${MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      BACKUP_PATH: /data/backups
    expose:
      - "8000"
    volumes:
      - backupdata:/data/backups
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery worker ─────────────────────────────────────────────
  worker:
    build: *backend_build
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *backend_env
    command: >
      celery -A src.workers.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=500
    volumes:
      - backupdata:/data/backups
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery beat ───────────────────────────────────────────────
  beat:
    build: *backend_build
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment: *backend_env
    command: >
      celery -A src.workers.celery_app:celery_app beat
      --loglevel=info
    networks:
      - backend

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pbxmonitorx
      POSTGRES_USER: pbxmonitorx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbxmonitorx"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  backupdata:

networks:
  frontend:
  backend:
